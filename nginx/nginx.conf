events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  upstream auth_service    { server auth:8001; }
  upstream gestion_service { server gestion:8002; }
  upstream archivos_service { server archivos:8003; }

  server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Frontend (index.html y admin.html) ────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── API Gateway ───────────────────────────────────────────────────────

    # Autenticación → auth service
    location /api/auth/ {
      rewrite ^/api/auth/(.*)$ /auth/$1 break;
      proxy_pass         http://auth_service;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gestión de proveedores → gestion service
    location /api/suppliers/ {
      rewrite ^/api/suppliers/(.*)$ /suppliers/$1 break;
      proxy_pass         http://gestion_service;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Documentos/archivos → archivos service
    location /api/documents/ {
      rewrite ^/api/documents/(.*)$ /documents/$1 break;
      proxy_pass         http://archivos_service;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health checks de cada servicio
    location /health/auth {
      rewrite ^/health/auth$ /health break;
      proxy_pass http://auth_service;
    }
    location /health/gestion {
      rewrite ^/health/gestion$ /health break;
      proxy_pass http://gestion_service;
    }
    location /health/archivos {
      rewrite ^/health/archivos$ /health break;
      proxy_pass http://archivos_service;
    }
  }
}
