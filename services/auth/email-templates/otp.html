<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código de acceso</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fa;font-family:sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fa;padding:2rem 0">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08)">
          <!-- Cabecera -->
          <tr>
            <td style="background:#1a56db;padding:1.5rem 2rem">
              <h1 style="margin:0;color:#ffffff;font-size:1.25rem;font-weight:700">Portal de Proveedores</h1>
            </td>
          </tr>
          <!-- Cuerpo -->
          <tr>
            <td style="padding:2rem">
              <p style="margin:0 0 1rem;color:#374151;font-size:1rem">Tu código de acceso es:</p>
              <div style="font-size:2.5rem;font-weight:700;letter-spacing:.3em;background:#f0f4ff;padding:1rem;border-radius:8px;text-align:center;color:#1a56db">{{otp}}</div>
              <p style="color:#6b7280;font-size:.95rem;margin-top:1.25rem;line-height:1.6">
                Válido durante {{otp_ttl_minutes}} minutos.<br>
                Si no solicitaste este código, ignora este mensaje.
              </p>
            </td>
          </tr>
          <!-- Pie -->
          <tr>
            <td style="padding:1rem 2rem;border-top:1px solid #e5e7eb;background:#f9fafb">
              <p style="margin:0;color:#9ca3af;font-size:.8rem;line-height:1.5">
                Si necesitas ayuda, contacta a <strong>{{admin_email}}</strong>.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
